name: Android APK

# Builds an installable debug APK for the parent/student portal app.
# Run it from the Actions tab (Run workflow), or it runs automatically when
# anything under android/ changes. Download the APK from the run's Artifacts
# section, open it on your phone, and install it (allow "unknown sources").
on:
  workflow_dispatch:
  push:
    paths:
      - "android/**"
      - ".github/workflows/android.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Gradle is provided here (gradle-wrapper.jar isn't committed), so we can
      # run tasks directly without a wrapper.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: school-portal-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
