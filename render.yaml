services:
  - type: web
    name: school-erp-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python manage_migrations.py upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: CENTRAL_DATABASE_URL
        sync: false
      - key: DEFAULT_SCHOOL_DATABASE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
      - key: UPLOAD_DIR
        value: ./uploads
      - key: BACKUP_DIR
        value: ./backups
